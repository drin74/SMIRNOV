<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Удаление видео</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #ff416c;
        }
        h2 { color: #ff416c; margin-bottom: 20px; }
        .btn {
            padding: 12px 30px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .btn-danger { background: #ff416c; color: white; }
        .btn-secondary { background: #444; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Удалить видео?</h2>
        <p style="margin: 20px 0;"><strong>{{ video.title }}</strong></p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'video_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</body>
</html>
